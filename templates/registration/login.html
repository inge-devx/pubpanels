<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion - PubPanels</title>
</head>
<body>
    <h1>Connexion</h1>

    {% if form.errors %}
        <p>Nom d’utilisateur ou mot de passe incorrect.</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Se connecter</button>
    </form>
</body>
</html>
